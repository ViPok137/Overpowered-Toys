name: Bug Report
description: Report a bug in Overpowered Toys
title: "[BUG] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug!
        Please fill out all required fields.

  - type: input
    id: mod_version
    attributes:
      label: Mod Version
      description: What version of the mod are you using?
      placeholder: e.g. v2.1.2
    validations:
      required: true

  - type: input
    id: rimworld_version
    attributes:
      label: RimWorld Version
      description: What version of RimWorld are you using?
      placeholder: e.g. 1.6
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe what happened.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can this bug be reproduced?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste Player.log or error messages here.
    validations:
      required: false

  - type: checkboxes
    id: agreement
    attributes:
      label: Before submitting a bug report, please confirm that:
      description: |
        - You have specified the exact version of RimWorld.
        - You have specified the exact version of the Overpowered Toys mod.
        - You have attached the full Player.log file (and Player-prev.log if necessary).
        - You have attached ModsConfig.xml.
        - You have not modified any of the provided files.
        - You have described the exact steps required to reproduce the issue.
        - You have verified that the problem can be reproduced consistently.
        - You understand that reports without logs, a mod list, or the required information may be rejected.
      options:
        - label: I agree
          required: true
